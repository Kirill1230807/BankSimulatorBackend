services:
  backend:
    build: .
    container_name: bank-backend

    ports:
      - "8080:8080"
    env_file:
      - .env

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank-db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}

    depends_on:
      - postgres

  postgres:
    image: postgres:17

    container_name: bank_database

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: bank-db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: